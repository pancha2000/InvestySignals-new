<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Register | InvestySignals</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .split-layout {
            display: flex;
            min-height: 100vh;
        }

        .split-right {
            width: 40%;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .split-right::before {
            content: '';
            position: absolute;
            bottom: 20%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(77, 159, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .split-left {
            width: 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--bg);
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            backdrop-filter: blur(12px);
        }

        .auth-header {
            margin-bottom: 32px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-muted);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .input-control {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border-soft);
            color: var(--text);
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            transition: var(--transition);
            outline: none;
        }

        .input-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 2px var(--gold-glow);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 24px;
        }

        .checkbox-group input {
            accent-color: var(--gold);
            width: 18px;
            height: 18px;
            margin-top: 2px;
        }

        .checkbox-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0;
            line-height: 1.4;
        }

        .checkbox-group a {
            color: var(--gold);
        }

        .btn-full {
            width: 100%;
            border-radius: 100px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--gold);
            font-weight: 600;
        }

        .error-message {
            color: var(--red);
            font-size: 0.875rem;
            margin-bottom: 16px;
            text-align: center;
            display: none;
            padding: 8px;
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid rgba(255, 77, 109, 0.2);
            border-radius: var(--radius-xs);
        }

        .pw-wrapper {
            position: relative;
        }

        .pw-strength {
            height: 4px;
            background: var(--surface);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
            display: flex;
        }

        .pw-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
        }

        .pw-strength-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: right;
            display: block;
        }

        .weak {
            background: var(--red);
            width: 33.33%;
        }

        .medium {
            background: var(--gold);
            width: 66.66%;
        }

        .strong {
            background: var(--green);
            width: 100%;
        }

        @media (max-width: 992px) {
            .split-layout {
                flex-direction: column-reverse;
            }

            .split-right {
                width: 100%;
                padding: 40px 24px;
                text-align: center;
            }

            .split-left {
                width: 100%;
                padding: 40px 24px;
            }
        }
    </style>
</head>

<body>

    <div class="split-layout">
        <!-- Left Panel (Form) -->
        <div class="split-left">
            <div class="auth-card fade-up visible">
                <div class="auth-header">
                    <h1>Create Account</h1>
                    <p>Start your data-driven trading journey</p>
                </div>

                <div id="errorMsg" class="error-message"></div>

                <form id="registerForm">
                    <div class="input-group">
                        <label for="displayName">Display Name</label>
                        <input type="text" id="displayName" class="input-control" placeholder="How should we call you?"
                            required>
                    </div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="input-control" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="pw-wrapper">
                            <input type="password" id="password" class="input-control"
                                placeholder="Create a strong password" required>
                        </div>
                        <div class="pw-strength">
                            <div id="pwBar" class="pw-strength-bar"></div>
                        </div>
                        <span id="pwText" class="pw-strength-text">Password strength</span>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="input-control"
                            placeholder="Confirm your password" required>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="terms.html">Terms of Service</a> and <a
                                href="privacy.html">Privacy Policy</a>.</label>
                    </div>

                    <button type="submit" class="btn btn-gold btn-full">Register Account</button>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="login.html">Log In</a>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="split-right">
            <div style="text-align: right;">
                <a href="index.html" class="logo" style="justify-content: flex-end;">
                    <span class="logo-icon">◈</span>
                    INVESTY<span class="logo-accent">SIGNALS</span>
                </a>
            </div>

            <div style="text-align: right;">
                <h2 style="font-size: 2rem; margin-bottom: 16px;">Join the elite tier of retail traders.</h2>
                <p style="color: var(--text-muted);">Get instant access to our real-time signals, 8-factor confluence
                    analysis, and built-in paper trading simulator.</p>
            </div>

            <div></div> <!-- Spacer -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA49TYbX5omoN56bffDnlqZGGjjpKZtOvk",
            authDomain: "investysignals-890ba.firebaseapp.com",
            projectId: "investysignals-890ba",
            storageBucket: "investysignals-890ba.firebasestorage.app",
            messagingSenderId: "1045281522975",
            appId: "1:1045281522975:web:534501aab2ceeb887bdc2a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById('registerForm');
        const nameInput = document.getElementById('displayName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const errorMsg = document.getElementById('errorMsg');
        const pwBar = document.getElementById('pwBar');
        const pwText = document.getElementById('pwText');

        // Password strength checker
        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let strength = 0;
            if (val.length > 5) strength++;
            if (val.length > 7 && /[A-Z]/.test(val) && /[0-9]/.test(val)) strength++;
            if (val.length > 9 && /[^A-Za-z0-9]/.test(val)) strength++;

            pwBar.className = 'pw-strength-bar';
            if (val.length === 0) {
                pwText.textContent = '';
            } else if (strength === 1) {
                pwBar.classList.add('weak');
                pwText.textContent = 'Weak';
            } else if (strength === 2) {
                pwBar.classList.add('medium');
                pwText.textContent = 'Medium';
            } else if (strength === 3) {
                pwBar.classList.add('strong');
                pwText.textContent = 'Strong';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            if (passwordInput.value !== confirmPasswordInput.value) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = 'Creating account...';
            btn.disabled = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
                await updateProfile(userCredential.user, { displayName: nameInput.value });
                sessionStorage.setItem('user', JSON.stringify(userCredential.user));
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorMsg.textContent = error.message.replace('Firebase: ', '');
                errorMsg.style.display = 'block';
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
