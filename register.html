<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — InvestySignals</title>
  <meta name="description" content="Create your InvestySignals account." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div data-announcement style="display:none"></div>

  <nav class="nav" data-nav>
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark"></div>
        <div class="brand-name">Investy<span class="accent">Signals</span></div>
      </a>

      <div class="nav-links">
        <a href="index.html" data-nav-link>Home</a>
        <a href="pricing.html" data-nav-link>Pricing</a>
        <a href="signals.html" data-nav-link>Signals</a>
        <a href="about.html" data-nav-link>About</a>
        <a href="contact.html" data-nav-link>Contact</a>
      </div>

      <div class="nav-actions">
        <button class="btn btn-ghost mobile-only" data-mobile-toggle aria-expanded="false" aria-label="Open menu">Menu</button>
        <a class="btn btn-ghost" href="login.html" data-guest-only>Login</a>
        <a class="btn btn-ghost" href="dashboard.html" data-auth-only style="display:none">Dashboard</a>
        <a class="btn btn-danger" href="#" data-auth-only data-logout style="display:none">Logout</a>
      </div>
    </div>
  </nav>

  <div class="mobile-drawer" data-mobile-drawer>
    <a href="index.html" data-nav-link>Home</a>
    <a href="pricing.html" data-nav-link>Pricing</a>
    <a href="signals.html" data-nav-link>Signals</a>
    <a href="about.html" data-nav-link>About</a>
    <a href="contact.html" data-nav-link>Contact</a>
    <a href="login.html" data-guest-only>Login</a>
    <a href="dashboard.html" data-auth-only style="display:none">Dashboard</a>
    <a href="#" data-auth-only data-logout style="display:none">Logout</a>
  </div>

  <main class="page">
    <section class="section">
      <div class="container">
        <div class="card" style="max-width:560px;margin:0 auto">
          <div class="card-inner" style="padding:24px">
            <div class="font-display" style="font-weight:700;font-size:1.35rem;letter-spacing:-0.02em">Create your account</div>
            <div style="height:8px"></div>
            <div class="muted">Start on the Free plan. Upgrade anytime.</div>
            <div style="height:16px"></div>

            <form class="form" id="registerForm">
              <div class="field">
                <div class="label">Full name</div>
                <input class="input" id="regName" type="text" autocomplete="name" placeholder="Your name" required />
              </div>
              <div class="field">
                <div class="label">Email</div>
                <input class="input" id="regEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
              </div>
              <div class="field">
                <div class="label">Password</div>
                <input class="input" id="regPassword" type="password" autocomplete="new-password" placeholder="At least 6 characters" required />
              </div>
              <div class="field">
                <div class="label">Confirm password</div>
                <input class="input" id="regConfirmPassword" type="password" autocomplete="new-password" placeholder="Repeat password" required />
              </div>
              <button class="btn btn-primary" id="regBtn" type="submit">Create account</button>
              <div class="hint">Already have an account? <a href="login.html" style="color:var(--accent2);font-weight:700">Login</a></div>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script type="module" src="./js/register-page.js"></script>
</body>
</html>
