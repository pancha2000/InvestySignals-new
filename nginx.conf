# ============================================================
#  Nginx config for InvestySignals — investysignals.store
#  Save to: /etc/nginx/sites-available/investysignals
#  Enable:  sudo ln -s /etc/nginx/sites-available/investysignals /etc/nginx/sites-enabled/
#  Reload:  sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ── Gzip compression (improves response time) ─────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css text/xml text/javascript
           application/javascript application/json application/xml
           image/svg+xml font/ttf font/woff font/woff2;

# ── HTTP server (temporary — until SSL cert installed) ────────
server {
    listen 80;
    listen [::]:80;
    server_name investysignals.store www.investysignals.store;

    # NOTE: Once certbot is run, replace this block with HTTP→HTTPS redirect:
    # return 301 https://$host$request_uri;

    # ── Static files ───────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://127.0.0.1:2000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── All other requests ─────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:2000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }
}

# ── HTTPS main server (enable after: sudo certbot --nginx -d investysignals.store -d www.investysignals.store) ─
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name investysignals.store www.investysignals.store;

    # SSL — run: sudo certbot --nginx -d investysignals.store -d www.investysignals.store
    ssl_certificate     /etc/letsencrypt/live/investysignals.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/investysignals.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (SEO + trust)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Static files — long-term browser cache ─────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://127.0.0.1:2000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── HTML pages — short cache, revalidate ───────────────────
    location ~* \.(html)$ {
        proxy_pass http://127.0.0.1:2000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── API routes — no cache ──────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:2000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        add_header Cache-Control "no-store";
    }

    # ── WebSocket ──────────────────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:2000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }

    # ── All other requests ─────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:2000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }
}
