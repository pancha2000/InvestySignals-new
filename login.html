<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — InvestySignals</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem 1.5rem 3rem;
      position: relative;
      overflow: hidden;
    }

    .auth-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(245,200,66,0.1) 0%, transparent 65%);
      top: -100px; right: -150px;
    }
    .auth-orb-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(77,159,255,0.07) 0%, transparent 65%);
      bottom: 0; left: -80px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .auth-top {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 1.5rem;
    }
    .auth-logo .logo-icon {
      width: 30px; height: 30px;
      background: var(--gold);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }
    .auth-logo span { color: var(--gold); }

    .auth-top h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .auth-top p { font-size: 0.875rem; color: var(--text-muted); }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.25rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span { font-size: 0.75rem; color: var(--text-dim); }

    .submit-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--gold);
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #0A0B0F;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 0.5rem;
      box-shadow: 0 4px 20px rgba(245,200,66,0.25);
      position: relative;
      overflow: hidden;
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .submit-btn:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(245,200,66,0.35); }
    .submit-btn:hover::after { opacity: 1; }
    .submit-btn:active { transform: translateY(0); }

    .submit-btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .submit-btn .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(10,11,15,0.3);
      border-top-color: #0A0B0F;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .submit-btn.loading .btn-text { display: none; }
    .submit-btn.loading .spinner { display: block; }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .auth-footer a { color: var(--gold); font-weight: 600; transition: var(--transition); }
    .auth-footer a:hover { color: var(--gold-light); }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: -0.5rem;
      margin-bottom: 1.25rem;
      transition: var(--transition);
    }
    .forgot-link:hover { color: var(--gold); }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1.5rem;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 9999;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
      box-shadow: var(--shadow);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: rgba(255,77,109,0.3); color: var(--red); }
    .toast.success { border-color: rgba(34,217,122,0.3); color: var(--green); }

    .input-wrap { position: relative; }
    .toggle-pw {
      position: absolute;
      right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); transition: var(--transition);
      padding: 4px;
    }
    .toggle-pw:hover { color: var(--text-muted); }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">📈</div>
      Investy<span>Signals</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="register.html" class="btn-primary">Sign Up →</a>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="pricing.html">Pricing</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="register.html" style="color:var(--gold); font-weight:700">Sign Up →</a>
  </div>

  <div class="page-wrapper auth-page">
    <div class="glow-orb auth-orb-1"></div>
    <div class="glow-orb auth-orb-2"></div>

    <div class="auth-card">
      <div class="auth-top">
        <a href="index.html" class="auth-logo">
          <div class="logo-icon">📈</div>
          Investy<span>Signals</span>
        </a>
        <h1>Welcome Back</h1>
        <p>ඔබේ account එකට login වන්න</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password" style="padding-right:2.75rem">
            <button type="button" class="toggle-pw" id="togglePw" title="Show/Hide">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <a href="#" class="forgot-link">Forgot your password?</a>

        <button type="submit" class="submit-btn" id="loginBtn">
          <span class="btn-text">Login to Dashboard</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign up free</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA49TYbX5omoN56bffDnlqZGGjjpKZtOvk",
      authDomain: "investysignals-890ba.firebaseapp.com",
      projectId: "investysignals-890ba",
      storageBucket: "investysignals-890ba.firebasestorage.app",
      messagingSenderId: "1045281522975",
      appId: "1:1045281522975:web:534501aab2ceeb887bdc2a",
      measurementId: "G-M1083J7SP6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Navbar scroll
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 40));

    // Hamburger
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });

    // Toggle password
    const togglePw = document.getElementById('togglePw');
    const loginPassword = document.getElementById('loginPassword');
    togglePw.addEventListener('click', () => {
      const show = loginPassword.type === 'password';
      loginPassword.type = show ? 'text' : 'password';
    });

    // Toast
    function showToast(msg, type = 'error') {
      const t = document.getElementById('toast');
      t.textContent = (type === 'error' ? '⚠️ ' : '✅ ') + msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    // Login
    const loginBtn = document.getElementById('loginBtn');
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = loginPassword.value;

      if (!email || !password) { showToast('Email සහ Password ඇතුලත් කරන්න.'); return; }

      loginBtn.classList.add('loading');
      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast('සාර්ථකව login වුණා!', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 900);
      } catch (err) {
        loginBtn.classList.remove('loading');
        const msgs = {
          'auth/invalid-credential': 'Email හෝ Password වැරදියි.',
          'auth/user-not-found': 'Account එකක් හොයාගන්න බැරි.',
          'auth/wrong-password': 'Password වැරදියි.',
          'auth/too-many-requests': 'ගණනාවක් try කළා. ටිකක් wait කරන්න.',
        };
        showToast(msgs[err.code] || 'Login error: ' + err.message);
      }
    });
  </script>
</body>
</html>
